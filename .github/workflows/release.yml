name: release

# Triggered by pushing a `*.*.*` git tag (e.g. 0.2.0), or manually via "Run workflow".
#
# Required repo secrets:
#   NUGET_API_KEY    - optional; if set, publishes to nuget.org
#                      (Settings > Secrets and variables > Actions)
#
# GitHub Packages publishing uses the auto-provided GITHUB_TOKEN -
# no extra config needed.

on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+", "[0-9]+.[0-9]+.[0-9]+-*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.2.0)"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore
        run: dotnet restore Bunny.sln

      - name: Build
        run: dotnet build Bunny.sln --configuration Release --no-restore -p:Version=${{ steps.version.outputs.value }}

      - name: Test
        run: dotnet test Bunny.sln --configuration Release --no-build

      - name: Pack
        run: |
          dotnet pack Bunny/Bunny.csproj \
            --configuration Release \
            --no-build \
            -p:Version=${{ steps.version.outputs.value }} \
            --output ./artifacts

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./artifacts/*.*nupkg

      - name: Push to NuGet.org
        if: env.NUGET_API_KEY != ''
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Push to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key "$GITHUB_TOKEN" \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --skip-duplicate

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*.*nupkg
          generate_release_notes: true
